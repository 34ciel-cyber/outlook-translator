<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>번역 도우미</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; font-size: 13px; background: #fff; color: #1f1f1f; padding: 12px; }

    .format-tag { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #4472C4; background: rgba(68,114,196,0.08); border: 0.5px solid #4472C4; border-radius: 20px; padding: 3px 9px; margin-bottom: 12px; width: fit-content; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4472C4; }

    .settings-toggle { font-size: 11px; color: #888; cursor: pointer; text-decoration: underline; margin-bottom: 10px; display: block; }
    .settings-panel { background: #f7f7f7; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; margin-bottom: 12px; }
    .api-row { display: flex; gap: 6px; align-items: center; }
    .api-row input { flex: 1; font-size: 11px; padding: 5px 8px; border: 1px solid #d0d0d0; border-radius: 5px; color: #1f1f1f; font-family: 'Segoe UI', sans-serif; }
    .api-save-btn { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 5px; border: none; background: #4472C4; color: #fff; cursor: pointer; white-space: nowrap; }
    .api-key-status { font-size: 10px; margin-top: 5px; }
    .api-key-status.ok { color: #107c10; }
    .api-key-status.none { color: #c00; }

    .seg { display: flex; border: 1px solid #d0d0d0; border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
    .seg-btn { flex: 1; padding: 6px 0; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: #fff; color: #666; transition: all 0.15s; }
    .seg-btn.active { background: #4472C4; color: #fff; }
    .seg-btn:not(:last-child) { border-right: 1px solid #d0d0d0; }

    .lbl { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
    .badge { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; background: rgba(68,114,196,0.12); color: #4472C4; text-transform: none; letter-spacing: 0; }
    .field { margin-bottom: 10px; }
    input[type=text], input[type=password], textarea { width: 100%; font-family: 'Segoe UI', sans-serif; font-size: 12px; border: 1px solid #d0d0d0; border-radius: 5px; padding: 6px 8px; line-height: 1.5; resize: vertical; color: #1f1f1f; }
    input[type=text]:focus, textarea:focus { outline: none; border-color: #4472C4; }
    textarea { min-height: 70px; }

    .dir-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .dir-btn { flex: 1; padding: 6px 0; font-size: 11px; font-weight: 600; border-radius: 5px; cursor: pointer; border: 1px solid #d0d0d0; background: #fff; color: #666; transition: all 0.15s; }
    .dir-btn.active { background: #1f1f1f; color: #fff; border-color: #1f1f1f; }

    .btn-primary { width: 100%; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; background: #4472C4; color: #fff; border: none; margin-bottom: 8px; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { width: 100%; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; background: #1f1f1f; color: #fff; border: none; margin-bottom: 8px; transition: opacity 0.15s; }
    .btn-secondary:hover { opacity: 0.85; }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

    .status { font-size: 11px; color: #888; text-align: center; padding: 4px 0 8px; word-break: break-word; }
    .status.success { color: #107c10; }
    .status.error { color: #c00; padding: 6px 8px; background: #fef0f0; border-radius: 4px; border: 1px solid #f5c0c0; text-align: left; }

    .ai-hint { font-size: 11px; color: #666; padding: 6px 8px; background: rgba(68,114,196,0.06); border-left: 2px solid #4472C4; border-radius: 3px; margin-bottom: 8px; line-height: 1.5; }
    .edit-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="format-tag"><span class="dot"></span>맑은 고딕 11pt · #4472C4</div>

<span class="settings-toggle" onclick="toggleSettings()">⚙ API 키 설정</span>
<div class="settings-panel hidden" id="settings-panel">
  <div class="lbl" style="margin-bottom:6px;">Anthropic API 키 <span class="badge">이 기기에만 저장</span></div>
  <div class="api-row">
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button class="api-save-btn" onclick="saveApiKey()">저장</button>
  </div>
  <div class="api-key-status" id="api-key-status"></div>
</div>

<div class="seg">
  <button class="seg-btn active" id="mode-manual" onclick="setMode('manual')">직접 번역</button>
  <button class="seg-btn" id="mode-ai" onclick="setMode('ai')">AI 초벌 번역</button>
</div>

<div id="panel-dir" class="hidden">
  <div class="lbl" style="margin-bottom:4px;">번역 방향</div>
  <div class="dir-row">
    <button class="dir-btn active" id="btn-ko-en" onclick="setDir('ko-en')">한국어 → EN</button>
    <button class="dir-btn" id="btn-en-ko" onclick="setDir('en-ko')">EN → 한국어</button>
  </div>
</div>

<div class="field">
  <div class="lbl">메일 제목 <span class="badge">원문</span></div>
  <input type="text" id="subject" placeholder="제목 자동 입력됨" />
</div>

<div class="field hidden" id="subject-tr-wrap">
  <div class="lbl">번역된 제목</div>
  <input type="text" id="subject-translated" placeholder="번역된 제목" />
</div>

<div id="panel-manual">
  <div class="field">
    <div class="lbl">번역문 본문</div>
    <textarea id="body-tr-manual" placeholder="번역된 본문을 붙여넣으세요."></textarea>
  </div>
  <div class="field">
    <div class="lbl">원문 본문 <span class="badge">자동 입력</span></div>
    <textarea id="body-orig-manual" placeholder="원문 본문 (자동 입력됨)"></textarea>
  </div>
</div>

<div id="panel-ai" class="hidden">
  <div class="field">
    <div class="lbl">원문 본문 <span class="badge">자동 입력</span></div>
    <div class="ai-hint">원문이 자동으로 들어와요. Claude가 초벌 번역 후 수정할 수 있어요.</div>
    <textarea id="body-orig-ai" placeholder="원문 본문 (자동 입력됨)"></textarea>
  </div>
  <button class="btn-primary" id="ai-btn" onclick="runAI()">Claude 초벌 번역 ↗</button>
  <div id="ai-result-field" class="hidden">
    <div class="field" style="margin-top:8px;">
      <div class="lbl">초벌 번역 결과 <span class="badge">수정 가능</span></div>
      <textarea id="body-tr-ai" style="min-height:80px;"></textarea>
      <div class="edit-hint">수정 후 아래 회신에 삽입을 누르세요.</div>
    </div>
  </div>
</div>

<div id="status-msg" class="status hidden"></div>

<button class="btn-secondary hidden" id="insert-btn" onclick="buildAndInsert()">회신에 삽입</button>

<script>
let mode = 'manual';
let direction = 'ko-en';
let isComposeMode = false;

// 마커: 이전 삽입 결과를 식별하고 제거하기 위함
const HEADER_START = '<!--TH-HEADER-START-->';
const HEADER_END = '<!--TH-HEADER-END-->';
const FOOTER_START = '<!--TH-FOOTER-START-->';
const FOOTER_END = '<!--TH-FOOTER-END-->';

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function loadApiKey() {
  try {
    const key = localStorage.getItem('anthropic_api_key') || '';
    const statusEl = document.getElementById('api-key-status');
    if (key) {
      document.getElementById('api-key-input').value = key;
      statusEl.textContent = '키 저장됨 ✓';
      statusEl.className = 'api-key-status ok';
    } else {
      statusEl.textContent = 'API 키가 없습니다. AI 번역을 사용하려면 입력해주세요.';
      statusEl.className = 'api-key-status none';
    }
  } catch(e) {}
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  const statusEl = document.getElementById('api-key-status');
  try {
    if (key) {
      localStorage.setItem('anthropic_api_key', key);
      statusEl.textContent = '저장됐습니다! ✓';
      statusEl.className = 'api-key-status ok';
    } else {
      localStorage.removeItem('anthropic_api_key');
      statusEl.textContent = '키가 삭제됐습니다.';
      statusEl.className = 'api-key-status none';
    }
  } catch(e) {
    statusEl.textContent = '저장 실패: ' + e.message;
    statusEl.className = 'api-key-status none';
  }
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('hidden');
}

Office.onReady(function(info) {
  loadApiKey();
  if (info.host === Office.HostType.Outlook) {
    const item = Office.context.mailbox.item;
    isComposeMode = typeof item.subject !== 'string';
    if (isComposeMode) {
      show('insert-btn');
      item.subject.getAsync(function(r) {
        if (r.status === Office.AsyncResultStatus.Succeeded)
          document.getElementById('subject').value = (r.value || '').replace(/^(RE:\s*|\[EXT\]\s*|Fw:\s*)+/gi, '').trim();
      });
    } else {
      document.getElementById('subject').value = (item.subject || '').replace(/^(RE:\s*|\[EXT\]\s*|Fw:\s*)+/gi, '').trim();
    }
    item.body.getAsync(Office.CoercionType.Text, function(r) {
      if (r.status === Office.AsyncResultStatus.Succeeded) {
        const cleaned = stripRequestLine(r.value || '');
        document.getElementById('body-orig-manual').value = cleaned;
        document.getElementById('body-orig-ai').value = cleaned;
      }
    });
  }
});

function stripRequestLine(text) {
  const lines = text.split('\n');
  let stopAt = lines.length;
  for (let i = 0; i < lines.length; i++) {
    if (/^(보낸 사람|보낸사람|From)\s*:/i.test(lines[i].trim())) {
      stopAt = i;
      break;
    }
  }
  return lines.slice(0, stopAt)
    .filter(line => !line.match(/번역\s*부탁드립니다|Please\s*translate/i))
    .join('\n').trim();
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-manual').classList.toggle('active', m === 'manual');
  document.getElementById('mode-ai').classList.toggle('active', m === 'ai');
  if (m === 'manual') {
    show('panel-manual'); hide('panel-ai'); hide('panel-dir'); show('subject-tr-wrap');
  } else {
    hide('panel-manual'); show('panel-ai'); show('panel-dir'); hide('subject-tr-wrap');
  }
}

function setDir(d) {
  direction = d;
  document.getElementById('btn-ko-en').classList.toggle('active', d === 'ko-en');
  document.getElementById('btn-en-ko').classList.toggle('active', d === 'en-ko');
}

async function runAI() {
  const apiKey = localStorage.getItem('anthropic_api_key') || '';
  if (!apiKey) {
    showStatus('API 키가 없어요. 상단 ⚙ API 키 설정을 눌러 입력해주세요.', 'error');
    show('settings-panel');
    return;
  }
  const subject = document.getElementById('subject').value.trim();
  const body = document.getElementById('body-orig-ai').value.trim();
  if (!body) { showStatus('원문 본문을 입력해주세요.', 'error'); return; }

  const btn = document.getElementById('ai-btn');
  btn.disabled = true;
  btn.textContent = '번역 중...';
  showStatus('Claude가 초벌 번역 중입니다...');

  const srcLang = direction === 'ko-en' ? 'Korean' : 'English';
  const tgtLang = direction === 'ko-en' ? 'English' : 'Korean';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        system: `You are a professional in-house translator. Translate the email content from ${srcLang} to ${tgtLang} accurately and naturally, preserving tone and formality. Return ONLY a valid JSON object with no markdown formatting, no code fences, no explanation. Format exactly: {"translatedSubject": "...", "translatedBody": "..."}`,
        messages: [{ role: 'user', content: `Subject: ${subject || '(none)'}\n\nBody:\n${body}` }]
      })
    });

    const responseText = await resp.text();
    if (!resp.ok) {
      let errMsg = `HTTP ${resp.status}`;
      try {
        const errData = JSON.parse(responseText);
        errMsg = errData.error?.message || errData.message || errMsg;
      } catch(e) {}
      throw new Error(errMsg);
    }

    const data = JSON.parse(responseText);
    if (!data.content || !data.content.length) throw new Error('응답에 content가 없습니다.');

    const raw = data.content.map(b => b.text || '').join('');
    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch(e) {
      throw new Error('JSON 파싱 실패. 응답: ' + raw.substring(0, 150));
    }

    if (parsed.translatedSubject) {
      document.getElementById('subject-translated').value = parsed.translatedSubject;
    }
    document.getElementById('body-tr-ai').value = parsed.translatedBody || '';
    show('ai-result-field');
    showStatus('번역 완료! 수정 후 회신에 삽입을 누르세요.', 'success');
  } catch(e) {
    showStatus('AI 번역 오류: ' + e.message, 'error');
    console.error('Translation error:', e);
  }
  btn.disabled = false;
  btn.textContent = 'Claude 초벌 번역 ↗';
}

function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
  el.classList.remove('hidden');
  if (type === 'success') setTimeout(() => el.classList.add('hidden'), 4000);
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function getValues() {
  const subject = document.getElementById('subject').value.trim();
  const subjectTr = document.getElementById('subject-translated').value.trim();
  const bodyTr = mode === 'manual'
    ? document.getElementById('body-tr-manual').value.trim()
    : document.getElementById('body-tr-ai').value.trim();
  const bodyOrig = mode === 'manual'
    ? document.getElementById('body-orig-manual').value.trim()
    : document.getElementById('body-orig-ai').value.trim();
  return { subject, subjectTr, bodyTr, bodyOrig };
}

// 이전에 삽입된 헤더/푸터 (마커 사이) 또는 마커 없는 옛날 결과를 모두 제거
function cleanPriorInsertions(html) {
  // 마커 기반 제거
  const headerRegex = new RegExp(escapeRegex(HEADER_START) + '[\\s\\S]*?' + escapeRegex(HEADER_END), 'g');
  const footerRegex = new RegExp(escapeRegex(FOOTER_START) + '[\\s\\S]*?' + escapeRegex(FOOTER_END), 'g');
  let cleaned = html.replace(headerRegex, '').replace(footerRegex, '');

  // 마커가 없는 옛날 결과 (이전 코드 버전)도 제거 시도
  // [번역/Translated] 로 시작하는 div 3개 제거
  cleaned = cleaned.replace(
    /<div[^>]*>\s*\[번역\/Translated\][^<]*<\/div>\s*<div[^>]*>\s*번역문이 추가되었습니다\.?\s*<\/div>\s*<div[^>]*>\s*Translation has been added\.?\s*<\/div>\s*(<div[^>]*>\s*&nbsp;\s*<\/div>\s*)?/gi, ''
  );
  // [번역문 / Translation] 부터 [원문 / Original] 다음 div 까지 제거
  cleaned = cleaned.replace(
    /(<div[^>]*>\s*&nbsp;\s*<\/div>\s*)?<div[^>]*>\s*\[번역문\s*\/\s*Translation\][^<]*<\/div>[\s\S]*?<div[^>]*>\s*\[원문\s*\/\s*Original\][^<]*<\/div>\s*<div[^>]*>[\s\S]*?<\/div>/gi, ''
  );

  return cleaned;
}

function buildAndInsert() {
  if (!isComposeMode) {
    showStatus('회신 작성 화면에서만 사용할 수 있어요.', 'error');
    return;
  }
  const { subject, subjectTr, bodyTr, bodyOrig } = getValues();
  if (!bodyTr && !bodyOrig) { showStatus('본문 내용을 입력해주세요.', 'error'); return; }

  const subjectLine = subjectTr || subject || '';
  const mg = `font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:11pt;color:#4472C4;`;
  const mgb = mg + `font-weight:bold;`;

  const topHeader = HEADER_START +
    `<div style="${mg}">[번역/Translated] ${escHtml(subjectLine)}</div>` +
    `<div style="${mg}">번역문이 추가되었습니다.</div>` +
    `<div style="${mg}">Translation has been added.</div>` +
    `<div>&nbsp;</div>` +
    HEADER_END;

  const bottomSection = FOOTER_START +
    `<div>&nbsp;</div>` +
    `<div style="${mgb}">[번역문 / Translation]</div>` +
    `<div>${escHtml(bodyTr)}</div>` +
    `<div>&nbsp;</div>` +
    `<div>---</div>` +
    `<div>&nbsp;</div>` +
    `<div style="${mgb}">[원문 / Original]</div>` +
    `<div>${escHtml(bodyOrig)}</div>` +
    FOOTER_END;

  showStatus('삽입 중...');

  Office.context.mailbox.item.body.getAsync(Office.CoercionType.Html, function(rGet) {
    if (rGet.status !== Office.AsyncResultStatus.Succeeded) {
      showStatus('본문 가져오기 실패: ' + (rGet.error?.message || ''), 'error');
      return;
    }
    let currentBody = rGet.value || '';

    // 이전 삽입 결과 제거
    currentBody = cleanPriorInsertions(currentBody);

    let newBody;
    if (/<body[^>]*>/i.test(currentBody)) {
      newBody = currentBody
        .replace(/(<body[^>]*>)/i, '$1' + topHeader)
        .replace(/(<\/body>)/i, bottomSection + '$1');
    } else {
      newBody = topHeader + currentBody + bottomSection;
    }

    Office.context.mailbox.item.body.setAsync(newBody, { coercionType: Office.CoercionType.Html }, function(rSet) {
      if (rSet.status === Office.AsyncResultStatus.Succeeded) {
        showStatus('회신에 삽입 완료!', 'success');
      } else {
        showStatus('삽입 실패: ' + (rSet.error?.message || ''), 'error');
      }
    });
  });
}
</script>
</body>
</html>
